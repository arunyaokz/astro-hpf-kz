<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HPF.kz Favicon - 2025 Pantone Peach Fuzz -->
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb5a7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e69a8c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="32" cy="32" r="30" fill="url(#faviconGradient)"/>
  
  <!-- HPF文字 -->
  <text x="32" y="42" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="20" letter-spacing="-0.5">
    HPF
  </text>
  
  <!-- 小字 .kz -->
  <text x="32" y="52" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="8" opacity="0.9">
    .kz
